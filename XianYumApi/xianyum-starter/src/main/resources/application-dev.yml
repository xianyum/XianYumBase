xian_yum:
  # 线程池配置
  executor:
    core-pool-size: 3
    max-pool-size: 6
    queue-capacity: 1000
    keep-alive-seconds: 60

redis:
  token:
    expire: 3  # token有效时长，单位天

#七牛云配置
dromara:
  x-file-storage:
    default-platform: qiniu-kodo-1
    custom-domain: https://dev.xianyum.cn/oss/
    qiniu-kodo:
      - platform: qiniu-kodo-1
        enable-storage: true
        access-key: ${QINIU_ACCESS_KEY:your-qiniu-access-key}
        secret-key: ${QINIU_SECRET_KEY:your-qiniu-secret-key}
        bucket-name: xianyum-dev
        domain: http://dev-oss.xianyum.cn/
        base-path: base-api/

mqtt:
  port: 9102
  host: localhost
  enabled: true
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:password}

qq:
  login:
    access_token_url: https://graph.qq.com/oauth2.0/token
    client_id: ${QQ_CLIENT_ID:your-qq-client-id}
    client_secret: ${QQ_CLIENT_SECRET:your-qq-client-secret}
    grant_type: authorization_code
    redirect_uri: http://localhost:8080/#/checkQQLogin
    open_id_url: https://graph.qq.com/oauth2.0/me
    user_info_url: https://graph.qq.com/user/get_user_info

proxy:
  ssl:
    enable: false
    port: 9101
    jksPath: test.jks
    keyStorePassword: ${PROXY_KEYSTORE_PASSWORD:123456}
    keyManagerPassword: ${PROXY_KEYMANAGER_PASSWORD:123456}
    needsClientAuth: false
    bind: 0.0.0.0

ali:
  login:
    app_private_key: ${ALI_APP_PRIVATE_KEY:your-alipay-private-key}
    alipay_public_key: ${ALI_ALIPAY_PUBLIC_KEY:your-alipay-public-key}
    app_id: ${ALI_APP_ID:your-alipay-app-id}
    server_url: https://openapi.alipaydev.com/gateway.do

ip:
  db:
    path: ./ipdb/ip2region.xdb

mybatis-plus:
  mapper-locations: classpath*:mapper/*Mapper.xml
  typeAliasesPackage: cn.xianyum.**.entity.po
  check-config-location: true
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    auto-mapping-unknown-column-behavior: warning
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      field-strategy: NOT_EMPTY
      capital-mode: true
      logic-delete-value: 1
      logic-not-delete-value: 0

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key}
      base-url: http://localhost:8105
      chat:
        options:
          model: auto-model
      retry:
        enabled: false

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:your-redis-password}
      timeout: 5000
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://localhost:3306/xianyum_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
          username: ${DB_USERNAME:root}
          password: ${DB_PASSWORD:your-db-password}
          driverClassName: com.mysql.cj.jdbc.Driver
      initial-size: 10
      max-active: 50
      min-idle: 5
      max-wait: 60000
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: false
        wall:
          config:
            multi-statement-allow: true
    druid:
      initialSize: 5
      minIdle: 5
      maxActive: 20
      maxWait: 60000
      connectTimeout: 30000
      socketTimeout: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      maxEvictableIdleTimeMillis: 900000
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      filters: stat,wall,slf4j,log4j2
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      aop-patterns: com.ruoyi.*.service.*,com.ruoyi.*.mapper.*
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
        session-stat-enable: false
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: true
        login-username: admin
        login-password: ${DRUID_PASSWORD:admin}
        allow: ""
        deny: ""
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

management:
  endpoint:
    shutdown:
      enabled: false
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
        exclude:
          - env
          - beans
          - shutdown
      cors:
        allowed-origins:
          - '*'
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: false

captcha:
  prefix: "${spring.application.name}:xianyum-system:captcha"
  expire:
    default: 10000
    WORD_IMAGE_CLICK: 20000
  init-default-resource: true
  local-cache-enabled: true
  local-cache-size: 20
  local-cache-wait-time: 5000
  local-cache-period: 2000
  local-cache-ignored-cache-fields: "_id"
  secondary:
    enabled: false
    expire: 120000
    keyPrefix: "${spring.application.name}:xianyum-system:captcha:secondary"
